<!DOCTYPE html>
<html>
<head>
<title>AI Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI';
}

/* Background */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

/* Glass Card */
.login-box {
    width: 350px;
    padding: 35px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    text-align: center;
    color: white;
}

/* Title */
.login-box h2 {
    margin-bottom: 25px;
    font-weight: 600;
}

/* Inputs */
.input-group {
    position: relative;
    margin-bottom: 20px;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    outline: none;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 14px;
}

.input-group input::placeholder {
    color: #ddd;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Error Message */
.error {
    margin-top: 15px;
    color: #ff6b6b;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="login-box">

<h2>🔐 AI Student Login</h2>

<form method="post">

<div class="input-group">
<input type="text" name="username" placeholder="Enter Username" required>
</div>

<div class="input-group">
<input type="password" name="password" placeholder="Enter Password" required>
</div>

<button type="submit">Login</button>

</form>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

</div>

</body>
</html>
